<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>D&D 5e Magic Item Looter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>D&D 5e Magic Item Looter</h1>
    <div class="toolbar">
        <button id="loginButton">
            Login
        </button>

        <button id="logoutButton" style="display:none;">
            Logout
        </button>

        <span id="userDisplay">
            Not logged in
        </span>

        <input
            type="text"
            id="search"
            placeholder="Search Items..."
        >
        <select class="owner-filter" id="ownerFilter">
            <option value="">All Owners</option>
        </select>
        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="Armor">Armor</option>
            <option value="Potion">Potion</option>
            <option value="Scroll">Scroll</option>
            <option value="Wand">Wand</option>
            <option value="Weapon">Weapon</option>
            <option value="Wondrous Item">Wondrous Item</option>
        </select>
        <select id="rarityFilter">
            <option value="">All Rarities</option>
            <option value="Common">Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Very Rare">Very Rare</option>
            <option value="Legendary">Legendary</option>
        </select>
        <label>
            <input
                type="checkbox"
                id="showLootedOnly"
            >
            Looted
        </label>
        <label>
            <input
                type="checkbox"
                id="showUnlootedOnly"
            >
            Unlooted
        </label>
        <label>
            <input
                type="checkbox"
                id="showAttunementOnly"
            >
            Attuned
        </label>
        <label>
            <input
                type="checkbox"
                id="showNoAttunementOnly"
            >
            Not Attuned
        </label>
        <label>
            <input
                type="checkbox"
                id="showPrintedOnly"
            >
            Printed
        </label>
        <label>
            <input
                type="checkbox"
                id="showNotPrintedOnly"
            >
            Not Printed
        </label>
    </div>
<div id="campaignStats"></div>
<div id="card-container"></div>
<div id="editModal" class="hidden">

    <div class="modal-content">

        <h2>Edit Item</h2>

        <input
            type="text"
            id="editName"
            placeholder="Name"
        >

        <input
            type="text"
            id="editCategory"
            placeholder="Category"
        >

        <input
            type="text"
            id="editImage"
            placeholder="Image URL"
        >

        <input
            type="text"
            id="editRarity"
            placeholder="Rarity"
        >

        <textarea
            id="editDescription"
            placeholder="Description"
        ></textarea>

        <label>
            <input
                type="checkbox"
                id="editAttunement"
            >
            Requires Attunement
        </label>

        <button id="saveEdit">
            Save
        </button>

        <button id="cancelEdit">
            Cancel
        </button>

    </div>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
