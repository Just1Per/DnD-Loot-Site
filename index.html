<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>D&D 5e Magic Item Looter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>D&D 5e Magic Item Looter</h1>
    <div class="toolbar">
        <button id="loginButton">
            Login
        </button>

        <button id="logoutButton" style="display:none;">
            Logout
        </button>

        <span id="userDisplay">
            Not logged in
        </span>

        <input
            type="text"
            id="search"
            placeholder="Search Items..."
        >
        <select class="owner-filter" id="ownerFilter">
            <option value="">All Owners</option>
        </select>
        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="Armor">Armor</option>
            <option value="Potion">Potion</option>
            <option value="Scroll">Scroll</option>
            <option value="Wand">Wand</option>
            <option value="Weapon">Weapon</option>
            <option value="Wondrous Item">Wondrous Item</option>
        </select>
        <select id="rarityFilter">
            <option value="">All Rarities</option>
            <option value="Common">Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Very Rare">Very Rare</option>
            <option value="Legendary">Legendary</option>
        </select>
        <select id="sourceFilter">
            <option value="">
                All Sources
            </option>
        </select>

        <select id="campaignFilter">
            <option value="">
                All Campaigns
            </option>
        </select>
        <label>
            <input
                type="checkbox"
                id="showLootedOnly"
            >
            Looted
        </label>
        <label>
            <input
                type="checkbox"
                id="showUnlootedOnly"
            >
            Unlooted
        </label>
        <label>
            <input
                type="checkbox"
                id="showAttunementOnly"
            >
            Attuned
        </label>
        <label>
            <input
                type="checkbox"
                id="showNoAttunementOnly"
            >
            Not Attuned
        </label>
        <label>
            <input
                type="checkbox"
                id="showPrintedOnly"
            >
            Printed
        </label>
        <label>
            <input
                type="checkbox"
                id="showNotPrintedOnly"
            >
            Not Printed
        </label>
    </div>
<div id="campaignStats"></div>
<div id="card-container"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
